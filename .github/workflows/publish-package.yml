# Publishing strategy:
#
# | Trigger        | Target    | Branch | Version                    | Tag                |
# |----------------|-----------|--------|----------------------------|--------------------|
# | GitHub Release |           | v0.3   | 0.3.29                     | latest/legacy (*)  |
# | GitHub Release |           | master | 1.0.0                      | latest (*)         |
# | GitHub Release |           | master | 1.0.0-pre                  | next               |
# | GitHub Release |           | master | 1.0.0-rc.1                 | next               |
# | Schedule       |           | v0.3   | 0.3.29-nightly.20260309    | nightly            |
# | Schedule       |           | master | 1.0.0-nightly.20260309     | dev                |
# | Manual         | release   | master | (same as GitHub Release)   | (auto)             |
# | Manual         | master    | master | 1.0.0-nightly.20260309     | dev                |
# | Manual         | v0.3      | v0.3   | 0.3.29-nightly.20260309    | nightly            |
#
# (*) Tag detection for releases: prerelease suffix → "next", stable → "latest" only if
#  the version is greater than the current "latest" (prevents older branches from
#  overtaking newer releases). Falls back to "legacy" otherwise (pnpm publish without --tag
#  defaults to latest).
#
# Nightly skip logic: compares HEAD against the last published gitHead for the dist-tag.
#
# Trusted Publishing only supports one workflow file per package, so we need to fit
# all our publish logic into a single workflow.

name: Publish Package

on:
  release:
    types:
      - published
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        type: choice
        options:
          - release
          - master
          - v0.3

concurrency:
  group: publish-package
  cancel-in-progress: false

jobs:
  setup:
    if: github.repository == 'typeorm/typeorm'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Determine publish matrix
        id: set-matrix
        run: |
          case "${{ github.event_name }}" in
            release)
              echo 'matrix=[{"target":"release"}]' >> $GITHUB_OUTPUT
              ;;
            schedule)
              echo 'matrix=[{"ref":"master","tag":"dev","node":"24"},{"ref":"v0.3","tag":"nightly","node":"20"}]' >> $GITHUB_OUTPUT
              ;;
            workflow_dispatch)
              TARGET="${{ inputs.target }}"
              if [ "$TARGET" == "release" ]; then
                echo 'matrix=[{"target":"release"}]' >> $GITHUB_OUTPUT
              else
                if [ "$TARGET" == "master" ]; then
                  TAG="dev"
                  NODE="24"
                else
                  TAG="nightly"
                  NODE="20"
                fi
                echo "matrix=[{\"ref\":\"$TARGET\",\"tag\":\"$TAG\",\"node\":\"$NODE\"}]" >> $GITHUB_OUTPUT
              fi
              ;;
          esac

  publish:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ matrix.ref || github.ref }}

      - uses: pnpm/action-setup@v5

      - name: Check if there are new commits since last publish (nightly) or if it's a release
        id: publishable
        run: |
          if [ "${{ matrix.target }}" == "release" ]; then
            echo "should_publish=true" >> $GITHUB_OUTPUT
            VERSION=$(node -p "require('./package.json').version")
            if [[ "$VERSION" == *-* ]]; then
              echo "tag=next" >> $GITHUB_OUTPUT
            else
              CURRENT_LATEST=$(pnpm view typeorm@latest version 2>/dev/null || echo "0.0.0")
              IS_GREATER=$(node -e "
                const a = '$VERSION'.split('.').map(Number);
                const b = '$CURRENT_LATEST'.split('.').map(Number);
                const gt = a[0] > b[0] || (a[0] === b[0] && (a[1] > b[1] || (a[1] === b[1] && a[2] > b[2])));
                console.log(gt ? 'true' : 'false');
              ")
              if [ "$IS_GREATER" == "true" ]; then
                echo "tag=latest" >> $GITHUB_OUTPUT
              else
                echo "Version $VERSION is not greater than current latest $CURRENT_LATEST – tagging as 'legacy'"
                echo "tag=legacy" >> $GITHUB_OUTPUT
              fi
            fi
          else
            echo "tag=${{ matrix.tag }}" >> $GITHUB_OUTPUT

            PUBLISHED_SHA=$(pnpm view typeorm@"${{ matrix.tag }}" gitHead 2>/dev/null || echo "")
            if [ -z "$PUBLISHED_SHA" ]; then
              echo "No published nightly found – publishing"
              echo "should_publish=true" >> $GITHUB_OUTPUT
            elif [ "$PUBLISHED_SHA" == "$(git rev-parse HEAD)" ]; then
              echo "HEAD matches last published nightly – skipping"
              echo "should_publish=false" >> $GITHUB_OUTPUT
            else
              echo "New commits since last published nightly – publishing"
              echo "should_publish=true" >> $GITHUB_OUTPUT
            fi
          fi

      # registry-url is deliberately omitted: with Trusted Publishing, the npm
      # CLI handles OIDC auth automatically. Setting registry-url would create
      # an .npmrc with an empty auth token placeholder that blocks the OIDC flow.
      - uses: actions/setup-node@v6
        if: steps.publishable.outputs.should_publish == 'true'
        with:
          node-version: ${{ matrix.node || '24' }}
          cache: "pnpm"

      - run: npm install -g npm@latest
        if: steps.publishable.outputs.should_publish == 'true'

      - run: pnpm install --frozen-lockfile
        if: steps.publishable.outputs.should_publish == 'true'

      - run: pnpm run package
        if: steps.publishable.outputs.should_publish == 'true'

      - name: Set nightly version
        if: steps.publishable.outputs.should_publish == 'true' && matrix.target != 'release'
        run: |
          BASE=$(node -p "require('./package.json').version.replace(/-.*/, '')")
          pnpm version "${BASE}-nightly.$(date -u +%Y%m%d)" --no-git-tag-version --allow-same-version
        working-directory: build/package

      - name: Publish typeorm
        if: steps.publishable.outputs.should_publish == 'true'
        run: pnpm publish --provenance --access public --no-git-checks --tag "${{ steps.publishable.outputs.tag }}"
        working-directory: build/package

      - name: Install @typeorm/codemod dependencies
        if: steps.publishable.outputs.should_publish == 'true' && matrix.ref != 'v0.3'
        run: pnpm install --frozen-lockfile
        working-directory: packages/codemod

      - name: Build @typeorm/codemod
        if: steps.publishable.outputs.should_publish == 'true' && matrix.ref != 'v0.3'
        run: pnpm run build
        working-directory: packages/codemod

      - name: Set codemod nightly version
        if: steps.publishable.outputs.should_publish == 'true' && matrix.target != 'release' && matrix.ref != 'v0.3'
        run: |
          BASE=$(node -p "require('./package.json').version.replace(/-.*/, '')")
          pnpm version "${BASE}-nightly.$(date -u +%Y%m%d)" --no-git-tag-version --allow-same-version
        working-directory: packages/codemod

      - name: Publish @typeorm/codemod
        if: steps.publishable.outputs.should_publish == 'true' && matrix.ref != 'v0.3'
        run: pnpm publish --provenance --access public --no-git-checks --tag "${{ steps.publishable.outputs.tag }}"
        working-directory: packages/codemod
